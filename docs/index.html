<body>
  <!-- PWA Force Auto-Update Script (Bulletproof Version Check) -->
  <script>
    async function checkAppVersionAndRefresh() {
      try {
        // version.json dosyasını cache'e takılmadan çekmek için t parametresi ve headers ekliyoruz
        const response = await fetch('/WP_Sayim/version.json?t=' + new Date().getTime(), {
          cache: 'no-store',
          headers: {
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache',
            'Expires': '0'
          }
        });
        const data = await response.json();
        const latestVersion = data.version;
        const currentVersion = localStorage.getItem('app_version');

        if (currentVersion && currentVersion !== latestVersion) {
          console.log('[PWA Update] Yeni versiyon bulundu! Caches temizleniyor...', latestVersion);
          
          // 1. Service Worker'ı devre dışı bırak
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) {
              if (registration.active && registration.active.scriptURL.includes('flutter_service_worker')) {
                await registration.unregister();
              }
            }
          }
          
          // 2. Tüm PWA Çerezlerini ve Önbelleği Sil
          if (window.caches) {
            const names = await caches.keys();
            await Promise.all(names.map(name => caches.delete(name)));
          }
          
          // 3. HTTP Disk Cache'i kırmak için kritik dosyaları zorla ağdan çek
          const filesToBust = [
            '/WP_Sayim/index.html',
            '/WP_Sayim/flutter_service_worker.js',
            '/WP_Sayim/main.dart.js',
            '/WP_Sayim/flutter_bootstrap.js'
          ];
          for (let file of filesToBust) {
            try {
              await fetch(file, { cache: 'reload' });
            } catch(e) {
              console.log('Cache bust failed for', file, e);
            }
          }
          
          // 4. Yeni sürümü kaydet
          localStorage.setItem('app_version', latestVersion);
          
          // 5. Kullanıcıya haber ver ve sayfayı URL parametresiyle yenile
          alert('Yeni bir güncelleme bulundu! Uygulama yenileniyor...');
          window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        } else if (!currentVersion) {
          // İlk açılışta versiyonu kaydet
          localStorage.setItem('app_version', latestVersion);
        }
      } catch (err) {
        console.log('Version check failed:', err);
      }
    }

    // Uygulama yüklendiğinde versiyonu kontrol et
    window.addEventListener('load', checkAppVersionAndRefresh);
    
    // Uygulama arka plandan öne geldiğinde de versiyonu kontrol et
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        checkAppVersionAndRefresh();
      }
    });
  </script>

  <!-- Service Worker Interceptor for FCM on GitHub Pages -->
  <script>
    if ('serviceWorker' in navigator) {
      // Firebase'in arka planda yapmaya çalıştığı /firebase-messaging-sw.js isteğini yakalayıp 
      // GitHub Pages dizinimize (WP_Sayim) yönlendiriyoruz.
      const originalRegister = navigator.serviceWorker.register;
      navigator.serviceWorker.register = function(url, options) {
        if (url === '/firebase-messaging-sw.js' || url.includes('firebase-messaging-sw.js')) {
          console.log('[SW Interceptor] Firebase SW isteği yakalandı. Yönlendiriliyor...');
          url = '/WP_Sayim/firebase-messaging-sw.js';
          
          // Scope'un da root dizin yerine WP_Sayim altında olması gerekiyor, 
          // yoksa GitHub Pages güvenlik hatası verir (Max scope allowed).
          if (options && options.scope) {
            options.scope = '/WP_Sayim/firebase-cloud-messaging-push-scope';
          } else if (!options) {
            options = { scope: '/WP_Sayim/firebase-cloud-messaging-push-scope' };
          }
        }
        return originalRegister.call(navigator.serviceWorker, url, options);
      };
    }

    // PWA Otomatik Güncelleme (Cache Temizleme Derdine Son!)
    // Yeni bir sürüm yayınlandığında Service Worker güncellenir ve sayfayı otomatik yeniler.
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          console.log('[PWA] Yeni sürüm algılandı, sayfa otomatik güncelleniyor...');
          window.location.reload();
        }
      });
      
      // Uygulama her açıldığında arka planda yeni sürüm var mı diye kontrol et
      window.addEventListener('load', () => {
        navigator.serviceWorker.ready.then((registration) => {
          registration.update();
        });
      });
    }
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
