<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/WP_Sayim/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WP Sayım Yönetim Uygulaması">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A1128">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WP Sayım">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WP Sayım</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Service Worker Interceptor for FCM on GitHub Pages -->
  <script>
    if ('serviceWorker' in navigator) {
      // Firebase'in arka planda yapmaya çalıştığı /firebase-messaging-sw.js isteğini yakalayıp 
      // GitHub Pages dizinimize (WP_Sayim) yönlendiriyoruz.
      const originalRegister = navigator.serviceWorker.register;
      navigator.serviceWorker.register = function(url, options) {
        if (url === '/firebase-messaging-sw.js' || url.includes('firebase-messaging-sw.js')) {
          console.log('[SW Interceptor] Firebase SW isteği yakalandı. Yönlendiriliyor...');
          url = '/WP_Sayim/firebase-messaging-sw.js';
          
          // Scope'un da root dizin yerine WP_Sayim altında olması gerekiyor, 
          // yoksa GitHub Pages güvenlik hatası verir (Max scope allowed).
          if (options && options.scope) {
            options.scope = '/WP_Sayim/firebase-cloud-messaging-push-scope';
          } else if (!options) {
            options = { scope: '/WP_Sayim/firebase-cloud-messaging-push-scope' };
          }
        }
        return originalRegister.call(navigator.serviceWorker, url, options);
      };
    }
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
