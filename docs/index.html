  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIOLuT4e4tAlwXYhKhwxB7qjPojrelZxs"></script>

<body>
  <script>
    // PWA Otomatik Güncelleme ve Hard Cache Temizleme
    async function checkForUpdates() {
      try {
        // Cache'i atlamak için rastgele bir timestamp ekliyoruz
        const response = await fetch('version.json?v=' + new Date().getTime(), {
          cache: 'no-store'
        });
        
        if (!response.ok) return;
        
        const data = await response.json();
        const latestVersion = data.version;
        const currentVersion = localStorage.getItem('appVersion');

        if (currentVersion && latestVersion && currentVersion !== latestVersion) {
          console.log('[PWA Update] Yeni versiyon bulundu!', latestVersion);
          
          // Mevcut Service Worker'ları ve Cache'i temizle
          if (window.caches) {
            try {
              const names = await caches.keys();
              await Promise.all(names.map(name => caches.delete(name)));
              console.log('[PWA Update] Tüm önbellek (cache) başarıyla silindi.');
            } catch (e) {
              console.error('[PWA Update] Önbellek silinirken hata oluştu:', e);
            }
          }
          
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) {
              await registration.unregister();
            }
          }
          
          // Yeni versiyonu kaydet
          localStorage.setItem('appVersion', latestVersion);
          
          alert('Uygulama güncellendi. Yeni sürüm yükleniyor...');
          window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        } else if (!currentVersion && latestVersion) {
          // İlk açılışta versiyonu kaydet
          localStorage.setItem('appVersion', latestVersion);
        }
      } catch (e) {
        console.error('Update check failed:', e);
      }
    }

    // Uygulama her açıldığında ve görünür olduğunda güncellemeleri kontrol et
    window.addEventListener('load', checkForUpdates);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        checkForUpdates();
      }
    });
  </script>

  <!-- Service Worker Interceptor for FCM on GitHub Pages -->
  <script>
    if ('serviceWorker' in navigator) {
      // Firebase'in arka planda yapmaya çalıştığı /firebase-messaging-sw.js isteğini yakalayıp 
      // GitHub Pages dizinimize (WP_Sayim) yönlendiriyoruz.
      const originalRegister = navigator.serviceWorker.register;
      navigator.serviceWorker.register = function(url, options) {
        if (url === '/firebase-messaging-sw.js' || url.includes('firebase-messaging-sw.js')) {
          console.log('[SW Interceptor] Firebase SW isteği yakalandı. Yönlendiriliyor...');
          url = '/WP_Sayim/firebase-messaging-sw.js';
          
          // Scope'un da root dizin yerine WP_Sayim altında olması gerekiyor, 
          // yoksa GitHub Pages güvenlik hatası verir (Max scope allowed).
          if (options && options.scope) {
            options.scope = '/WP_Sayim/firebase-cloud-messaging-push-scope';
          } else if (!options) {
            options = { scope: '/WP_Sayim/firebase-cloud-messaging-push-scope' };
          }
        }
        return originalRegister.call(navigator.serviceWorker, url, options);
      };
    }
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // flutter_bootstrap.js dosyasının önbelleğe alınmasını engellemek için cache buster ekleniyor.
    const bootstrapScript = document.createElement('script');
    bootstrapScript.src = "flutter_bootstrap.js?v=" + new Date().getTime();
    bootstrapScript.async = true;
    document.body.appendChild(bootstrapScript);
  </script>
</body>
